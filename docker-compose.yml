version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: credit_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: /app/entrypoint.sh
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      DB_HOST: db
      DB_NAME: credit_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - .:/app

  celery_worker:
    build: .
    command: celery -A credit_approval worker -l info
    depends_on:
      - db
      - redis
    environment:
      DB_HOST: db
      DB_NAME: credit_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - .:/app

volumes:
  pgdata:
